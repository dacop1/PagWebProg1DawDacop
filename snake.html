    <style>
        /* Estilos específicos para la página del juego */
        .game-section {
            padding-top: calc(var(--header-height, 80px) + 2rem);
            padding-bottom: 4rem;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }
        .score {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
        }
        #restartBtn {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
        }
        #restartBtn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(77, 255, 145, 0.3);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background-color: #1a1d24;
            width: 100%;
            max-width: 500px;
            height: auto;
            aspect-ratio: 1/1;
            outline: none;
            touch-action: none; /* Evita el scroll al hacer swipe en móvil */
        }
        .controls-info {
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .controls-info i {
            color: var(--accent);
            margin: 0 0.3rem;
        }
        #gameOverMsg {
            color: #ff4d4d;
            font-weight: 600;
            margin-top: 0.5rem;
            min-height: 2rem;
        }
        /* Botones táctiles para móvil */
        .mobile-controls {
            display: none;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .control-btn {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            touch-action: manipulation;
        }
        .control-btn:active {
            transform: scale(0.9);
            background: var(--accent-hover);
        }
        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
            }
            .game-header {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <header class="header" id="header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html#inicio">Daniel Copete</a>
            </div>

                <ul class="nav-menu" id="nav-menu">
                    <li><a href="index.html#inicio" class="nav-link">Inicio</a></li>
                    <li><a href="index.html#portfolio" class="nav-link">Portfolio</a></li>
                    <li><a href="index.html#proyectos" class="nav-link">Proyectos</a></li>
                    <li><a href="index.html#sobre-mi" class="nav-link">Sobre mí</a></li>
                    <li><a href="index.html#contacto" class="nav-link">Contacto</a></li>
                </ul>
                <div class="hamburger" id="hamburger" aria-label="Abrir menú" role="button" tabindex="0">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section class="game-section">
            <div class="container">
                <div class="game-container">
                    <div class="game-header">
                        <h1 style="margin:0; font-size:1.8rem;">Snake Game</h1>
                        <div class="score">Puntuación: <span id="score">0</span></div>
                        <button id="restartBtn"><i class="fas fa-redo-alt"></i> Reiniciar</button>
                    </div>
                    <canvas id="gameCanvas" width="400" height="400" tabindex="0"></canvas>
                    <div id="gameOverMsg"></div>
                    <div class="controls-info">
                        <i class="fas fa-arrow-up"></i> <i class="fas fa-arrow-down"></i> 
                        <i class="fas fa-arrow-left"></i> <i class="fas fa-arrow-right"></i> Usa las flechas o desliza
                    </div>
                    
                    <!-- Controles táctiles (solo visibles en móvil) -->
                    <div class="mobile-controls">
                        <button class="control-btn" data-dir="up"><i class="fas fa-arrow-up"></i></button>
                        <div style="display: flex; gap: 1rem;">
                            <button class="control-btn" data-dir="left"><i class="fas fa-arrow-left"></i></button>
                            <button class="control-btn" data-dir="down"><i class="fas fa-arrow-down"></i></button>
                            <button class="control-btn" data-dir="right"><i class="fas fa-arrow-right"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-container">

        </div>

    <!-- Botón volver arriba -->
    <button id="scrollToTop" class="scroll-top" aria-label="Volver arriba"><i class="fas fa-arrow-up"></i></button>

    <!-- Script principal (para header, menú, etc.) -->
    <script src="script.js"></script>

    <!-- Script del juego Snake (con soporte móvil) -->
    <script>
        (function() {
            // ----- ELEMENTOS DEL DOM -----
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreSpan = document.getElementById('score');
            const restartBtn = document.getElementById('restartBtn');
            const gameOverMsg = document.getElementById('gameOverMsg');

            // ----- CONSTANTES DEL JUEGO -----
            const GRID_SIZE = 20;
            const TILE_COUNT = canvas.width / GRID_SIZE;
            const MOVE_INTERVAL = 150; // ms

            // ----- ESTADO DEL JUEGO -----
            let snake = [{x: 10, y: 10}];
            let direction = {x: 1, y: 0};      // Dirección actual: derecha
            let nextDirection = {x: 1, y: 0};   // Dirección que se aplicará en el próximo movimiento
            let food = {x: 5, y: 5};
            let score = 0;
            let gameRunning = true;
            let gameInterval = null;

            // ----- GENERAR COMIDA EN CELDA LIBRE -----
            function generateFood() {
                const freeCells = [];
                for (let x = 0; x < TILE_COUNT; x++) {
                    for (let y = 0; y < TILE_COUNT; y++) {
                        if (!snake.some(segment => segment.x === x && segment.y === y)) {
                            freeCells.push({x, y});
                        }
                    }
                }
                if (freeCells.length === 0) {
                    gameOverMsg.textContent = "¡Enhorabuena! Has llenado el tablero.";
                    gameRunning = false;
                    clearInterval(gameInterval);
                    return;
                }
                const randomIndex = Math.floor(Math.random() * freeCells.length);
                food = freeCells[randomIndex];
            }

            // ----- DIBUJAR -----
            function draw() {
                ctx.fillStyle = '#1a1d24';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Cuadrícula
                ctx.strokeStyle = '#3a3f4a';
                ctx.lineWidth = 1;
                for (let i = 0; i <= TILE_COUNT; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * GRID_SIZE, 0);
                    ctx.lineTo(i * GRID_SIZE, canvas.height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i * GRID_SIZE);
                    ctx.lineTo(canvas.width, i * GRID_SIZE);
                    ctx.stroke();
                }

                // Serpiente
                for (let i = 0; i < snake.length; i++) {
                    const seg = snake[i];
                    ctx.fillStyle = i === 0 ? '#8affbc' : '#4dff91';
                    ctx.fillRect(seg.x * GRID_SIZE + 2, seg.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
                }

                // Comida
                ctx.fillStyle = '#ff4d4d';
                ctx.beginPath();
                ctx.arc(food.x * GRID_SIZE + GRID_SIZE/2, food.y * GRID_SIZE + GRID_SIZE/2, GRID_SIZE/2 - 3, 0, Math.PI * 2);
                ctx.fill();
            }

            // ----- MOVER -----
            function move() {
                if (!gameRunning) return;

                // Aplicar la dirección pendiente
                direction = {...nextDirection};

                // Nueva cabeza
                let head = {
                    x: snake[0].x + direction.x,
                    y: snake[0].y + direction.y
                };

                // Atravesar paredes (efecto toroide)
                if (head.x < 0) head.x = TILE_COUNT - 1;
                if (head.x >= TILE_COUNT) head.x = 0;
                if (head.y < 0) head.y = TILE_COUNT - 1;
                if (head.y >= TILE_COUNT) head.y = 0;

                // Colisión con el propio cuerpo (excepto la cabeza)
                if (snake.some((segment, index) => index !== 0 && segment.x === head.x && segment.y === head.y)) {
                    gameOver();
                    return;
                }

                // Añadir nueva cabeza
                snake.unshift(head);

                // Verificar si ha comido
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    scoreSpan.textContent = score;
                    generateFood();
                } else {
                    snake.pop();
                }

                draw();
            }

            // ----- GAME OVER -----
            function gameOver() {
                gameRunning = false;
                gameOverMsg.textContent = `¡Game Over! Puntuación final: ${score}`;
                if (gameInterval) {
                    clearInterval(gameInterval);
                    gameInterval = null;
                }
            }

            // ----- CAMBIAR DIRECCIÓN (evita reversa) -----
            function changeDirection(newDir) {
                // Evitar que la serpiente retroceda sobre sí misma
                if (direction.x === -newDir.x && direction.y === -newDir.y) return;
                nextDirection = newDir;
            }

            // ----- REINICIAR JUEGO -----
            function restartGame() {
                snake = [{x: 10, y: 10}];
                direction = {x: 1, y: 0};
                nextDirection = {x: 1, y: 0};
                score = 0;
                gameRunning = true;
                scoreSpan.textContent = score;
                gameOverMsg.textContent = '';
                generateFood();
                draw();
                if (gameInterval) clearInterval(gameInterval);
                gameInterval = setInterval(move, MOVE_INTERVAL);
            }

            // ----- EVENTOS DE TECLADO (PC) -----
            window.addEventListener('keydown', (e) => {
                if (e.key.startsWith('Arrow')) e.preventDefault();
                switch(e.key) {
                    case 'ArrowUp': changeDirection({x: 0, y: -1}); break;
                    case 'ArrowDown': changeDirection({x: 0, y: 1}); break;
                    case 'ArrowLeft': changeDirection({x: -1, y: 0}); break;
                    case 'ArrowRight': changeDirection({x: 1, y: 0}); break;
                }
            });

            // ----- CONTROLES TÁCTILES (BOTONES) -----
            document.querySelectorAll('.control-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const dir = btn.dataset.dir;
                    switch(dir) {
                        case 'up': changeDirection({x: 0, y: -1}); break;
                        case 'down': changeDirection({x: 0, y: 1}); break;
                        case 'left': changeDirection({x: -1, y: 0}); break;
                        case 'right': changeDirection({x: 1, y: 0}); break;
                    }
                });
            });

            // ----- DETECCIÓN DE SWIPE EN MÓVIL -----
            let touchStartX = 0, touchStartY = 0;
            canvas.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                e.preventDefault(); // Evitar scroll mientras se juega
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                if (!touchStartX || !touchStartY) return;
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                const dx = touchEndX - touchStartX;
                const dy = touchEndY - touchStartY;
                const absDx = Math.abs(dx);
                const absDy = Math.abs(dy);

                // Umbral mínimo de desplazamiento (20px)
                if (Math.max(absDx, absDy) < 20) return;

                if (absDx > absDy) {
                    // Movimiento horizontal
                    if (dx > 0) changeDirection({x: 1, y: 0}); // derecha
                    else changeDirection({x: -1, y: 0});       // izquierda
                } else {
                    // Movimiento vertical
                    if (dy > 0) changeDirection({x: 0, y: 1}); // abajo
                    else changeDirection({x: 0, y: -1});       // arriba
                }

                touchStartX = 0; touchStartY = 0; // Reset
            });

            // ----- INICIALIZAR JUEGO -----
            generateFood();
            draw();
            gameInterval = setInterval(move, MOVE_INTERVAL);
        })();
    </script>
</body>
</html>
